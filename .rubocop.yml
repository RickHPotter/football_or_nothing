# The behavior of RuboCop can be controlled via the .rubocop.yml
# configuration file. It makes it possible to enable/disable
# certain cops (checks) and to alter their behavior if they accept
# any parameters. The file can be placed either in your home
# directory or in some project directory.
#
# RuboCop will start looking for the configuration file in the directory
# where the inspected file is and continue its way up to the root directory.
#
# See https://docs.rubocop.org/rubocop/configuration

AllCops:
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "Guardfile"
    - "bin/**"
    - "db/**/*"
    - "config/**/*"
    - "**/vendor/**/*"
    - "**/vendor/**/.*"
    - "node_modules/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/PercentLiteralDelimiters:
  PreferredDelimiters:
    default: "[]"

Style/Documentation:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

Layout/LineLength:
  Max: 166
  Exclude:
    - "lib/tasks/openfootball.rake"
    - "test/models/data_import/importers_test.rb"

Layout/SpaceInsideArrayLiteralBrackets:
  EnforcedStyle: space

Metrics/CyclomaticComplexity:
  Max: 16

Metrics/PerceivedComplexity:
  Max: 16

Metrics/ModuleLength:
  Max: 200

Metrics/ClassLength:
  Max: 200
  Exclude:
    - "app/models/data_import/brasfoot/audit_report.rb"
    - "app/models/data_import/brasfoot/java_serialization_reader.rb"
    - "app/models/data_import/brasfoot/pack_importer.rb"
    - "app/models/match_simulator.rb"

Metrics/MethodLength:
  Max: 32
  Exclude:
    - "app/components/**/*.rb"
    - "app/views/**/*.rb"
    - "config/**/*.rb"

Metrics/AbcSize:
  Max: 32
  Exclude:
    - "app/components/**/*.rb"
    - "app/views/**/*.rb"
    - "config/**/*.rb"
    - "app/models/data_import/athletes_importer.rb"
    - "app/models/international_competition_generator.rb"
    - "app/models/match_simulator.rb"
    - "app/models/tournament_finalizer.rb"
    - "app/models/transfer_processor.rb"
    - "app/models/youth_intake_generator.rb"
    - "app/services/world_generator.rb"

Metrics/BlockLength:
  Max: 22
  Exclude:
    - "app/components/**/*.rb"
    - "app/views/**/*.rb"
    - "config/**/*.rb"
    - "spec/**/*"
    - "lib/tasks/**/*.rake"
    - "test/**/*"

Metrics/ParameterLists:
  Exclude:
    - "app/models/data_import/open_football_competition_importer.rb"
    - "app/models/news_publisher.rb"
    - "app/models/transfer_processor.rb"
    - "lib/tasks/openfootball.rake"

Lint/ConstantDefinitionInBlock:
  Exclude:
    - "lib/tasks/**/*.rake"

Security/Open:
  Exclude:
    - "lib/tasks/openfootball.rake"

Lint/MissingSuper:
  Enabled: true
  Exclude:
    - "app/components/**/*.rb"
    - "app/views/**/*.rb"
